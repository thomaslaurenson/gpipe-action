name: Sync

on:
  workflow_dispatch:
    inputs:
      gpipe_version:
        description: gpipe version tag to sync (e.g. v1.2.0)
        required: true

jobs:
  sync:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout gpipe-action
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate version format
        shell: bash
        run: |
          version="${{ github.event.inputs.gpipe_version }}"
          if ! [[ "$version" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Error: invalid version '$version': expected semver tag like v1.2.0"
            exit 1
          fi

      - name: Clone gpipe at tag
        run: |
          git clone --depth=1 --branch "${{ github.event.inputs.gpipe_version }}" \
            https://github.com/thomaslaurenson/gpipe /tmp/gpipe-sync

      - name: Sync source into vendor/gpipe
        run: |
          rsync -a --delete --exclude='.git' /tmp/gpipe-sync/ vendor/gpipe/
          echo "${{ github.event.inputs.gpipe_version }}" > vendor/gpipe/GPIPE_VERSION
          rm -rf /tmp/gpipe-sync

      - name: Commit synced source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vendor/gpipe/
          git commit -m "chore: sync gpipe ${{ github.event.inputs.gpipe_version }}"
          git push

      - name: Move v1 tag
        run: |
          git tag -f v1
          git push origin v1 --force
