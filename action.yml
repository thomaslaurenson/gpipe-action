name: gpipe
description: Generate install.sh, install.ps1, and checksums.txt for GitHub releases
author: thomaslaurenson

inputs:
  version:
    description: Release version tag (e.g. v1.2.3). Validated as semver before use.
    required: true
    default: ${{ github.ref_name }}
  repo:
    description: GitHub repository in owner/repo format
    required: false
    default: ${{ github.repository }}
  config:
    description: Path to .gpipe.yml config file relative to repo root
    required: false
    default: .gpipe.yml
  gpipe_version:
    description: Version of gpipe to download from its own releases
    required: false
    default: v1.0.0
  cosign_sign:
    description: Sign checksums.txt with cosign after generation
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Validate version format
      shell: bash
      run: |
        version="${{ inputs.version }}"
        if ! [[ "$version" =~ ^v?[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
          echo "Error: invalid version '$version': expected semantic version like v1.2.3 or 1.2.3"
          exit 1
        fi

    - name: Install cosign
      uses: sigstore/cosign-installer@v3

    - name: Download gpipe binary
      shell: bash
      run: |
        curl -fsSL --connect-timeout 30 --speed-limit 1024 --speed-time 30 \
          "https://github.com/thomaslaurenson/gpipe/releases/download/${{ inputs.gpipe_version }}/gpipe-linux-x86_64" \
          -o "$RUNNER_TEMP/gpipe"

    - name: Download checksums.txt for gpipe binary
      shell: bash
      run: |
        curl -fsSL --connect-timeout 30 --speed-limit 1024 --speed-time 30 \
          "https://github.com/thomaslaurenson/gpipe/releases/download/${{ inputs.gpipe_version }}/checksums.txt" \
          -o "$RUNNER_TEMP/gpipe-checksums.txt"

    - name: Verify gpipe binary checksum
      shell: bash
      run: |
        cd "$RUNNER_TEMP"
        expected=$(grep -F '  gpipe-linux-x86_64' gpipe-checksums.txt | awk '{print $1}')
        if [[ -z "$expected" ]]; then
          echo "Error: gpipe-linux-x86_64 not found in checksums.txt" >&2
          exit 1
        fi
        actual=$(sha256sum gpipe | awk '{print $1}')
        if [[ "$expected" != "$actual" ]]; then
          echo "Error: gpipe checksum mismatch" >&2
          echo "  expected: $expected" >&2
          echo "  actual:   $actual" >&2
          exit 1
        fi
        echo "gpipe checksum OK"

    - name: Verify cosign signature on gpipe checksums.txt
      shell: bash
      run: |
        cosign verify-blob \
          --certificate-identity-regexp='.*' \
          --certificate-oidc-issuer-regexp='.*' \
          "$RUNNER_TEMP/gpipe-checksums.txt"

    - name: Make gpipe executable
      shell: bash
      run: chmod +x "$RUNNER_TEMP/gpipe"

    - name: Run gpipe generate
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        "$RUNNER_TEMP/gpipe" generate \
          --repo "${{ inputs.repo }}" \
          --version "${{ inputs.version }}" \
          --config "${{ inputs.config }}" \
          $([ "${{ inputs.cosign_sign }}" = "true" ] && echo "--sign")
